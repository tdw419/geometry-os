     1|conventions:
     2|- Every new opcode gets a test in tests/program_tests.rs
     3|- Every new program gets assembled by test_all_programs_assemble
     4|- README.md updated when opcodes or features change
     5|- roadmap.yaml is the single source of truth for project state
     6|- 'Semantic versioning: minor bump for new opcodes, patch for fixes'
     7|- New opcodes need a program that needs them (no speculative opcodes)
     8|- All new opcodes added to assembler.rs, preprocessor.rs OPCODES list, and vm.rs disassembler
     9|- Opcode numbers assigned sequentially from next available
    10|- Canvas and screen mappings use LOAD/STORE interception, not new opcodes
    11|- ASMSELF and RUNNEXT take no operands (1-byte instructions)
    12|- Error reporting via RAM[0xFFD] (existing ASM result port)
    13|description: Pixel-art virtual machine with built-in assembler, debugger, and live
    14|  GUI. Write assembly in the built-in text editor, press F5, watch it run. 154 opcodes,
    15|  3720 tests, 147 programs, 76635 LOC. Bidirectional VFS Pixel Surface. RISC-V hypervisor.
    16|  Infinite map desktop.
    17|global_risks:
    18|- 'Opcode space: 154 of ~256 slots used, plenty of room'
    19|- Scope creep -- adding features is easy, keeping the OS coherent is hard
    20|- Kernel boundary breaks existing programs -- need a compatibility mode
    21|- Memory protection removes shared RAM -- IPC now in place (Phase 27), window_manager
    22|  tests passing
    23|- Filesystem persistence needs host directory -- WASM port needs different backing
    24|- 'Phase 24 memory protection resolved: page tables + segfaults working, IPC replaces
    25|  shared-RAM for multiprocess'
    26|- 'Phase 28 device drivers: IOCTL opcode 0x62, 4 device files at fds 0xE000-0xE003'
    27|- Self-modifying code is inherently hard to debug -- need good error reporting
    28|- Assembly inside a running VM may be slow for large programs -- may need optimization
    29|- The concept of a program rewriting itself challenges test design -- how do you unit
    30|  test a program that changes?
    31|- RAM size expansion (phase 46) affects the fuzzer which generates random addresses
    32|- VFS pixel surface hash collisions with many files
    33|- Alpine Linux boot may require more RAM or MMU support
