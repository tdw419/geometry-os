<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry OS -- Browser VM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: #e94560;
            margin-bottom: 4px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #888;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .main {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .canvas-wrap {
            background: #0f0f23;
            border: 2px solid #e94560;
            border-radius: 4px;
            padding: 4px;
        }
        #geo-canvas {
            image-rendering: pixelated;
            width: 512px;
            height: 512px;
            display: block;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 280px;
        }
        .program-select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #e94560;
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        textarea {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.75rem;
            resize: vertical;
            min-height: 200px;
            width: 100%;
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        button:hover { background: #c73a52; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; }
        .status {
            font-size: 0.75rem;
            color: #888;
            padding: 4px 0;
        }
        .status.error { color: #e94560; }
        .info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 12px;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Geometry OS</h1>
    <div class="subtitle">Pixel-art VM in your browser -- 41 opcodes, 256x256 canvas</div>

    <div class="main">
        <div class="canvas-wrap">
            <canvas id="geo-canvas"></canvas>
        </div>

        <div class="controls">
            <select id="program-select" class="program-select">
                <option value="hello">Hello World</option>
                <option value="gradient">Gradient</option>
                <option value="checkerboard">Checkerboard</option>
                <option value="nested_rects">Nested Rects</option>
                <option value="colors">Color Palette</option>
                <option value="rings">Concentric Rings</option>
                <option value="circles">Circles</option>
                <option value="lines">Star Burst</option>
                <option value="fire">Fire Animation</option>
                <option value="snake">Snake</option>
                <option value="ball">Bouncing Ball</option>
                <option value="custom">Custom (edit below)</option>
            </select>

            <textarea id="source-editor" spellcheck="false"></textarea>

            <div class="btn-row">
                <button id="btn-run">▶ Run</button>
                <button id="btn-stop" disabled>■ Stop</button>
                <button id="btn-step">⏭ Step</button>
            </div>

            <div id="status" class="status">Ready. Select a program and click Run.</div>

            <div id="regs" class="status" style="font-size:0.65rem; max-height:80px; overflow-y:auto;"></div>
        </div>
    </div>

    <div class="info">
        Programs run entirely in your browser via WebAssembly.
        Keyboard input works for interactive programs (click canvas first to focus).
        Built-in programs are embedded in this page.
    </div>

    <script type="module">
        import init, { GeometryOS } from './pkg/geometry_os_wasm.js';

        // ── Built-in demo programs ─────────────────────────────────────
        const PROGRAMS = {
            hello: `
; Hello World -- displays text on screen
LDI r0, 0xFFFFFF
LDI r1, 100
LDI r2, 120
STORE 0x100, r0
LDI r0, msg
TEXT r1, r2, r0
HALT
msg: .db "Hello, World!", 0
`,
            gradient: `
; Horizontal gradient
LDI r0, 0
loop_y:
    LDI r1, 0
loop_x:
    PSETI r1, r0, r1
    ADDI r1, 1
    CMP r1, 256
    BLT r0, loop_x
    ADDI r0, 1
    CMP r0, 256
    BLT r0, loop_y
HALT
`,
            checkerboard: `
; Checkerboard pattern
#define TILE 8
LDI r5, 0
loop_y:
    LDI r4, 0
loop_x:
    LDI r0, r4
    LDI r1, r5
    XOR r0, r1
    ANDI r0, 16
    JZ r0, white
    LDI r2, 0x000000
    JMP draw
white:
    LDI r2, 0xFFFFFF
draw:
    PSETI r4, r5, r2
    ADDI r4, 1
    CMP r4, 256
    BLT r0, loop_x
    ADDI r5, 1
    CMP r5, 256
    BLT r0, loop_y
HALT
`,
            nested_rects: `
; Concentric colored rectangles
LDI r7, 0
loop:
    LDI r0, r7
    PSETI r0, r0, r7
    ADDI r7, 0x040404
    CMP r7, 128
    BLT r0, loop
    LDI r7, 127
loop2:
    LDI r0, r7
    PSETI r0, r0, r7
    SUBI r7, 1
    CMP r7, 0
    BLT r0, loop2
HALT
`,
            colors: `
; Color palette display
LDI r0, 0
LDI r1, 0
LDI r2, 0
loop:
    PSETI r1, r2, r0
    ADDI r1, 1
    LDI r3, 32
    CMP r1, r3
    BLT r0, row_done
    LDI r1, 0
    ADDI r2, 1
row_done:
    ADDI r0, 0x008080
    JNZ r0, loop
HALT
`,
            rings: `
; Concentric rings using CIRCLE opcode
LDI r0, 128
LDI r1, 128
LDI r2, 0
LDI r3, 0xFFFFFF
loop:
    LDI r4, r2
    CIRCLE r0, r1, r4, r3
    ADDI r2, 10
    CMP r2, 120
    BLT r0, loop
HALT
`,
            circles: `
; Circle test
LDI r0, 128
LDI r1, 128
LDI r2, 50
LDI r3, 0xFF0000
CIRCLE r0, r1, r2, r3
LDI r2, 30
LDI r3, 0x00FF00
CIRCLE r0, r1, r2, r3
LDI r2, 10
LDI r3, 0x0000FF
CIRCLE r0, r1, r2, r3
HALT
`,
            lines: `
; Star burst
LDI r0, 128
LDI r1, 128
LDI r2, 0
LDI r3, 0xFFFFFF
loop:
    PUSH r0
    PUSH r1
    PUSH r2
    PUSH r3
    LDI r4, r2
    LDI r5, r4
    LDI r6, 0
    LINE r0, r1, r4, r5, r3
    POP r3
    POP r2
    POP r1
    POP r0
    ADDI r2, 16
    CMP r2, 256
    BLT r0, loop
HALT
`,
            fire: `
; Simple fire animation using SCROLL + random noise
LDI r0, 0
noise:
    RAND r1
    ANDI r1, 0x00FF00
    PSETI r0, 255, r1
    ADDI r0, 1
    CMP r0, 256
    BLT r0, noise
    SCROLL 1
    FRAME
    JMP noise
`,
            snake: `
; Simple snake -- WASD to move
#define UP 119
#define DOWN 115
#define LEFT 97
#define RIGHT 100
LDI r8, 128       ; snake X
LDI r9, 128       ; snake Y
LDI r10, 4        ; direction (0=up, 1=down, 2=left, 3=right)
LDI r11, 0        ; apple X
LDI r12, 0        ; apple Y
CALL place_apple
loop:
    IKEY r0
    JZ r0, no_key
    ; Check direction
    LDI r1, UP
    CMP r0, r1
    JNZ r0, chk_down
    LDI r10, 0
    JMP no_key
chk_down:
    LDI r1, DOWN
    CMP r0, r1
    JNZ r0, chk_left
    LDI r10, 1
    JMP no_key
chk_left:
    LDI r1, LEFT
    CMP r0, r1
    JNZ r0, chk_right
    LDI r10, 2
    JMP no_key
chk_right:
    LDI r1, RIGHT
    CMP r0, r1
    JNZ r0, no_key
    LDI r10, 3
no_key:
    ; Erase old position
    PSETI r8, r9, 0
    ; Move
    LDI r0, r10
    JZ r0, move_up
    SUBI r0, 1
    JZ r0, move_down
    SUBI r0, 1
    JZ r0, move_left
    JMP move_right
move_up:
    SUBI r9, 1
    JMP moved
move_down:
    ADDI r9, 1
    JMP moved
move_left:
    SUBI r8, 1
    JMP moved
move_right:
    ADDI r8, 1
moved:
    ; Wrap
    LDI r0, r8
    ANDI r0, 0xFF
    LDI r8, r0
    LDI r0, r9
    ANDI r0, 0xFF
    LDI r9, r0
    ; Draw snake
    LDI r0, 0x00FF00
    PSETI r8, r9, r0
    ; Draw apple
    LDI r0, 0xFF0000
    PSETI r11, r12, r0
    ; Speed limit
    LDI r0, 0xFFE
    LOAD r1, r0
    ANDI r1, 7
    JNZ r1, skip_frame
    FRAME
skip_frame:
    JMP loop
place_apple:
    RAND r11
    ANDI r11, 0xFF
    RAND r12
    ANDI r12, 0xFF
    RET
`,
            ball: `
; Bouncing ball
LDI r0, 128   ; X
LDI r1, 64    ; Y
LDI r2, 3     ; dX
LDI r3, 2     ; dY
LDI r4, 0xFF0000  ; color
loop:
    ; Erase old
    PSETI r0, r1, 0
    ; Move
    ADD r0, r2
    ADD r1, r3
    ; Bounce X
    LDI r5, r0
    CMP r5, 253
    BLT r5, chk_x_min
    NEG r2
chk_x_min:
    LDI r5, r0
    CMP r5, 2
    BLT r5, chk_y
    NEG r2
chk_y:
    ; Bounce Y
    LDI r5, r1
    CMP r5, 253
    BLT r5, chk_y_min
    NEG r3
chk_y_min:
    LDI r5, r1
    CMP r5, 2
    BLT r5, draw
    NEG r3
draw:
    ; Draw new
    PSETI r0, r1, r4
    ; Speed limit
    LDI r5, 0xFFE
    LOAD r6, r5
    ANDI r6, 3
    JNZ r6, skip_frame
    FRAME
skip_frame:
    JMP loop
`
        };

        // ── State ─────────────────────────────────────────────────────
        let geo = null;
        let running = false;
        let animFrameId = null;

        const canvas = document.getElementById('geo-canvas');
        const select = document.getElementById('program-select');
        const editor = document.getElementById('source-editor');
        const btnRun = document.getElementById('btn-run');
        const btnStop = document.getElementById('btn-stop');
        const btnStep = document.getElementById('btn-step');
        const statusEl = document.getElementById('status');
        const regsEl = document.getElementById('regs');

        // ── Init ───────────────────────────────────────────────────────
        async function main() {
            await init();
            geo = new GeometryOS('geo-canvas');
            selectProgram(select.value);
        }

        function selectProgram(name) {
            if (name === 'custom') {
                editor.readOnly = false;
            } else {
                editor.value = PROGRAMS[name] || '';
                editor.readOnly = true;
            }
        }

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (isError ? ' error' : '');
        }

        function updateRegs() {
            if (!geo) return;
            let lines = [];
            for (let i = 0; i < 16; i++) {
                lines.push(`r${i.toString().padStart(2,'0')}=${geo.get_reg(i).toString(16).padStart(8,'0').toUpperCase()}`);
            }
            lines.push(`PC=${geo.get_pc().toString(16).padStart(8,'0').toUpperCase()}`);
            lines.push(` halted=${geo.is_halted()} frames=${geo.get_frame_count()}`);
            regsEl.textContent = lines.join('  ');
        }

        // ── Run loop ───────────────────────────────────────────────────
        function runLoop() {
            if (!running) return;
            try {
                const stillRunning = geo.tick();
                updateRegs();

                // Handle beeps via AudioContext
                const beep = geo.get_beep();
                if (beep !== null) {
                    playBeep(beep[0], beep[1]);
                }

                if (stillRunning) {
                    animFrameId = requestAnimationFrame(runLoop);
                } else {
                    stopRunning();
                    setStatus('Program halted.');
                }
            } catch (e) {
                stopRunning();
                setStatus('Error: ' + e.message, true);
            }
        }

        function playBeep(freq, dur) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.value = 0.1;
                osc.start();
                osc.stop(ctx.currentTime + dur / 1000);
            } catch (e) {
                // Audio not available, ignore
            }
        }

        function startRunning() {
            const source = editor.value;
            try {
                const len = geo.load(source);
                setStatus(`Loaded ${len} words. Running...`);
                running = true;
                btnRun.disabled = true;
                btnStop.disabled = false;
                btnStep.disabled = true;
                animFrameId = requestAnimationFrame(runLoop);
            } catch (e) {
                setStatus('Assembly error: ' + e, true);
            }
        }

        function stopRunning() {
            running = false;
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            btnRun.disabled = false;
            btnStop.disabled = true;
            btnStep.disabled = false;
        }

        // ── Events ─────────────────────────────────────────────────────
        select.addEventListener('change', () => selectProgram(select.value));

        btnRun.addEventListener('click', () => {
            stopRunning();
            geo.reset();
            startRunning();
        });

        btnStop.addEventListener('click', () => {
            stopRunning();
            setStatus('Stopped.');
        });

        btnStep.addEventListener('click', () => {
            if (!geo || geo.is_halted()) {
                // Load first
                try {
                    geo.reset();
                    geo.load(editor.value);
                    setStatus('Loaded. Stepping...');
                } catch (e) {
                    setStatus('Assembly error: ' + e, true);
                    return;
                }
            }
            geo.step();
            updateRegs();
            if (geo.is_halted()) {
                setStatus('Program halted.');
            }
        });

        // Keyboard input for interactive programs
        canvas.setAttribute('tabindex', '0');
        canvas.addEventListener('keydown', (e) => {
            if (!geo) return;
            geo.key_press(e.keyCode);
            e.preventDefault();
        });
        canvas.addEventListener('keyup', (e) => {
            if (!geo) return;
            geo.key_clear();
            e.preventDefault();
        });

        // ── Go ─────────────────────────────────────────────────────────
        main().catch(e => setStatus('Failed to init WASM: ' + e, true));
    </script>
</body>
</html>
